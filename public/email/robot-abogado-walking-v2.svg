<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 145" width="400" height="145">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2548a8"/>
      <stop offset="100%" stop-color="#162044"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="tieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0F172A" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#22D3EE" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Floor line -->
  <line x1="0" y1="140" x2="400" y2="140" stroke="#E2E8F0" stroke-width="0.6" stroke-dasharray="4,4"/>

  <!-- Footprints trail -->
  <g opacity="0.12" fill="#3B82F6">
    <ellipse cx="30" cy="139" rx="6" ry="3"/>
    <ellipse cx="50" cy="139" rx="6" ry="3"/>
    <ellipse cx="80" cy="139" rx="6" ry="3"/>
    <ellipse cx="100" cy="139" rx="6" ry="3"/>
    <ellipse cx="130" cy="139" rx="6" ry="3"/>
    <ellipse cx="150" cy="139" rx="6" ry="3"/>
  </g>

  <!-- === ROBOT GROUP (walks left to right) === -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="-60,0;340,0;-60,0" dur="12s" repeatCount="indefinite"/>

    <!-- Bounce while walking -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0;0,-3;0,0" dur="0.6s" repeatCount="indefinite"/>

      <!-- === LEFT LEG === -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-15,24,105;15,24,105;-15,24,105" dur="0.6s" repeatCount="indefinite"/>
        <rect x="14" y="105" width="18" height="24" rx="3" fill="#2548a8" stroke="#162044" stroke-width="0.6"/>
        <rect x="10" y="126" width="24" height="10" rx="4" fill="#162044"/>
        <circle cx="23" cy="105" r="3.5" fill="#3B82F6" stroke="#2548a8" stroke-width="0.5"/>
      </g>

      <!-- === RIGHT LEG === -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="15,46,105;-15,46,105;15,46,105" dur="0.6s" repeatCount="indefinite"/>
        <rect x="38" y="105" width="18" height="24" rx="3" fill="#2548a8" stroke="#162044" stroke-width="0.6"/>
        <rect x="36" y="126" width="24" height="10" rx="4" fill="#162044"/>
        <circle cx="47" cy="105" r="3.5" fill="#3B82F6" stroke="#2548a8" stroke-width="0.5"/>
      </g>

      <!-- === BODY === -->
      <rect x="8" y="58" width="54" height="50" rx="4" fill="url(#bodyGrad)" stroke="#162044" stroke-width="0.6"/>

      <!-- Body studs -->
      <circle cx="22" cy="58" r="4" fill="#3B82F6" stroke="#2548a8" stroke-width="0.5"/>
      <circle cx="35" cy="58" r="4" fill="#3B82F6" stroke="#2548a8" stroke-width="0.5"/>
      <circle cx="48" cy="58" r="4" fill="#3B82F6" stroke="#2548a8" stroke-width="0.5"/>

      <!-- Shirt collar (white V) -->
      <path d="M22 62 L35 72 L48 62" fill="none" stroke="white" stroke-width="2"/>
      <path d="M24 63 L35 70 L46 63" fill="white" opacity="0.15"/>

      <!-- RED TIE -->
      <!-- Knot -->
      <polygon points="32,68 38,68 36,73 34,73" fill="url(#tieGrad)" stroke="#BE123C" stroke-width="0.4"/>
      <!-- Tie body -->
      <polygon points="33,73 37,73 38,92 35,95 32,92" fill="url(#tieGrad)" stroke="#BE123C" stroke-width="0.4"/>
      <!-- Tie shine -->
      <line x1="35" y1="74" x2="35" y2="90" stroke="#FDA4AF" stroke-width="0.8" opacity="0.45"/>
      <!-- Tie stripe details -->
      <line x1="33" y1="78" x2="37" y2="78" stroke="#BE123C" stroke-width="0.4" opacity="0.5"/>
      <line x1="33" y1="83" x2="37.5" y2="83" stroke="#BE123C" stroke-width="0.4" opacity="0.5"/>
      <line x1="33.5" y1="88" x2="37.5" y2="88" stroke="#BE123C" stroke-width="0.4" opacity="0.5"/>

      <!-- === LEFT ARM === -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="20,8,62;-20,8,62;20,8,62" dur="0.6s" repeatCount="indefinite"/>
        <rect x="-6" y="60" width="16" height="34" rx="4" fill="#2548a8" stroke="#162044" stroke-width="0.6"/>
        <rect x="-4" y="91" width="12" height="9" rx="3" fill="#FBBF24" stroke="#D97706" stroke-width="0.6"/>
      </g>

      <!-- === RIGHT ARM (holding briefcase) === -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-20,60,62;20,60,62;-20,60,62" dur="0.6s" repeatCount="indefinite"/>
        <rect x="60" y="60" width="16" height="34" rx="4" fill="#2548a8" stroke="#162044" stroke-width="0.6"/>
        <rect x="62" y="91" width="12" height="9" rx="3" fill="#FBBF24" stroke="#D97706" stroke-width="0.6"/>

        <!-- Briefcase -->
        <g transform="translate(62, 98)">
          <rect x="-2" y="0" width="18" height="14" rx="2" fill="#162044" stroke="#1E293B" stroke-width="0.6"/>
          <rect x="4" y="-2" width="6" height="4" rx="1.5" fill="none" stroke="#22D3EE" stroke-width="0.8"/>
          <line x1="2" y1="7" x2="12" y2="7" stroke="#3B82F6" stroke-width="0.6"/>
          <circle cx="8" cy="7" r="1.5" fill="#22D3EE"/>
        </g>
      </g>

      <!-- === NECK === -->
      <rect x="26" y="52" width="18" height="8" rx="3" fill="#FCD34D" stroke="#D97706" stroke-width="0.5"/>

      <!-- === HEAD === -->
      <rect x="16" y="10" width="38" height="44" rx="8" fill="url(#faceGrad)" stroke="#D97706" stroke-width="0.6"/>

      <!-- Head stud -->
      <circle cx="35" cy="10" r="5" fill="#FCD34D" stroke="#D97706" stroke-width="0.6"/>

      <!-- Antenna -->
      <line x1="35" y1="5" x2="35" y2="-8" stroke="#22D3EE" stroke-width="1" filter="url(#glow)"/>
      <circle cx="35" cy="-10" r="3" fill="#162044" stroke="#22D3EE" stroke-width="0.6"/>
      <circle cx="35" cy="-10" r="1.5" fill="#22D3EE">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>

      <!-- Eyes -->
      <rect x="22" y="22" width="10" height="8" rx="2" fill="white" stroke="#0F172A" stroke-width="0.8"/>
      <rect x="25" y="24" width="4.5" height="4.5" rx="1" fill="#0F172A"/>
      <rect x="26" y="25" width="2" height="2" fill="#22D3EE"/>

      <rect x="38" y="22" width="10" height="8" rx="2" fill="white" stroke="#0F172A" stroke-width="0.8"/>
      <rect x="41" y="24" width="4.5" height="4.5" rx="1" fill="#0F172A"/>
      <rect x="42" y="25" width="2" height="2" fill="#22D3EE"/>

      <!-- Blinking -->
      <rect x="22" y="22" width="10" height="8" rx="2" fill="url(#faceGrad)">
        <animate attributeName="height" values="0;0;0;0;8;0;0;0;0;0;0;0" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="38" y="22" width="10" height="8" rx="2" fill="url(#faceGrad)">
        <animate attributeName="height" values="0;0;0;0;8;0;0;0;0;0;0;0" dur="4s" repeatCount="indefinite"/>
      </rect>

      <!-- Smile -->
      <path d="M27 38 Q35 45 43 38" fill="none" stroke="#0F172A" stroke-width="1.4" stroke-linecap="round"/>

    </g>
  </g>
</svg>

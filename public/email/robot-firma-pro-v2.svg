<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 130" width="300" height="130">
  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="faceG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="tieG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="shoeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="caseG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0F172A" flood-opacity="0.2"/>
    </filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feFlood flood-color="#22D3EE" flood-opacity="0.6" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Walking robot group -->
  <g filter="url(#sh)">
    <animateTransform attributeName="transform" type="translate" values="-50,0;260,0;-50,0" dur="10s" repeatCount="indefinite"/>

    <!-- Bounce -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-2.5;0,0;0,-2.5;0,0" dur="0.5s" repeatCount="indefinite"/>

      <!-- LEFT LEG -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-18,20,82;18,20,82;-18,20,82" dur="0.5s" repeatCount="indefinite"/>
        <rect x="12" y="82" width="15" height="20" rx="2.5" fill="#1E3A8A" stroke="#1E3A8A" stroke-width="0.3"/>
        <rect x="8" y="100" width="21" height="8" rx="3.5" fill="url(#shoeG)"/>
        <circle cx="19.5" cy="82" r="3" fill="#3B82F6" stroke="#2563EB" stroke-width="0.5"/>
      </g>

      <!-- RIGHT LEG -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="18,38,82;-18,38,82;18,38,82" dur="0.5s" repeatCount="indefinite"/>
        <rect x="31" y="82" width="15" height="20" rx="2.5" fill="#1E3A8A" stroke="#1E3A8A" stroke-width="0.3"/>
        <rect x="29" y="100" width="21" height="8" rx="3.5" fill="url(#shoeG)"/>
        <circle cx="38.5" cy="82" r="3" fill="#3B82F6" stroke="#2563EB" stroke-width="0.5"/>
      </g>

      <!-- BODY -->
      <rect x="6" y="42" width="46" height="42" rx="3.5" fill="url(#bodyG)" stroke="#1E3A8A" stroke-width="0.5"/>
      
      <!-- Body studs -->
      <circle cx="17" cy="42" r="3.2" fill="#3B82F6" stroke="#2563EB" stroke-width="0.4"/>
      <circle cx="29" cy="42" r="3.2" fill="#3B82F6" stroke="#2563EB" stroke-width="0.4"/>
      <circle cx="41" cy="42" r="3.2" fill="#3B82F6" stroke="#2563EB" stroke-width="0.4"/>

      <!-- White shirt collar V -->
      <path d="M14 45 L29 56 L44 45" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
      <path d="M16 46 L29 54 L42 46" fill="white" opacity="0.1"/>

      <!-- RED TIE -->
      <polygon points="26.5,53 31.5,53 30,57 28,57" fill="url(#tieG)"/>
      <polygon points="27.5,57 30.5,57 31.5,73 29,76 26.5,73" fill="url(#tieG)"/>
      <line x1="29" y1="58" x2="29" y2="72" stroke="#FCA5A5" stroke-width="0.6" opacity="0.35"/>

      <!-- LEFT ARM (swinging) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="22,6,46;-22,6,46;22,6,46" dur="0.5s" repeatCount="indefinite"/>
        <rect x="-5" y="44" width="13" height="28" rx="3.5" fill="#1E3A8A" stroke="#1E3A8A" stroke-width="0.3"/>
        <rect x="-3" y="70" width="10" height="7" rx="2.5" fill="#FBBF24" stroke="#F59E0B" stroke-width="0.4"/>
      </g>

      <!-- RIGHT ARM (holding briefcase) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-22,50,46;22,50,46;-22,50,46" dur="0.5s" repeatCount="indefinite"/>
        <rect x="50" y="44" width="13" height="28" rx="3.5" fill="#1E3A8A" stroke="#1E3A8A" stroke-width="0.3"/>
        <rect x="52" y="70" width="10" height="7" rx="2.5" fill="#FBBF24" stroke="#F59E0B" stroke-width="0.4"/>
        
        <!-- BIGGER BRIEFCASE -->
        <g transform="translate(48, 75)">
          <!-- Main body -->
          <rect x="0" y="0" width="22" height="17" rx="2" fill="url(#caseG)"/>
          <!-- Top edge -->
          <rect x="0" y="0" width="22" height="3" rx="2" fill="#334155"/>
          <!-- Handle -->
          <rect x="6" y="-4" width="8" height="5" rx="2" fill="none" stroke="#22D3EE" stroke-width="1"/>
          <!-- Lock/clasp -->
          <rect x="8.5" y="7" width="5" height="3.5" rx="1" fill="#334155" stroke="#475569" stroke-width="0.3"/>
          <circle cx="11" cy="8.8" r="1.3" fill="#22D3EE"/>
          <!-- Detail lines -->
          <line x1="3" y1="13" x2="19" y2="13" stroke="#1E293B" stroke-width="0.4"/>
          <!-- Corner reinforcements -->
          <rect x="0" y="0" width="3" height="17" rx="1" fill="#1E293B" opacity="0.15"/>
          <rect x="19" y="0" width="3" height="17" rx="1" fill="#1E293B" opacity="0.15"/>
        </g>
      </g>

      <!-- NECK -->
      <rect x="22" y="37" width="14" height="7" rx="2.5" fill="#FBBF24" stroke="#F59E0B" stroke-width="0.4"/>

      <!-- HEAD -->
      <rect x="13" y="4" width="32" height="35" rx="7" fill="url(#faceG)" stroke="#F59E0B" stroke-width="0.5"/>
      
      <!-- Head stud -->
      <circle cx="29" cy="4" r="4" fill="#FBBF24" stroke="#F59E0B" stroke-width="0.5"/>

      <!-- Antenna -->
      <line x1="29" y1="0" x2="29" y2="-10" stroke="#22D3EE" stroke-width="1.2" filter="url(#gl)"/>
      <circle cx="29" cy="-12" r="2.5" fill="#0F172A" stroke="#22D3EE" stroke-width="0.8"/>
      <circle cx="29" cy="-12" r="1.2" fill="#22D3EE">
        <animate attributeName="opacity" values="1;0.15;1" dur="1.2s" repeatCount="indefinite"/>
      </circle>

      <!-- EYES -->
      <rect x="18" y="14" width="8.5" height="7.5" rx="1.8" fill="white" stroke="#1E293B" stroke-width="0.6"/>
      <rect x="20.5" y="16" width="4" height="4" rx="0.8" fill="#1E293B"/>
      <rect x="21.3" y="16.8" width="1.8" height="1.8" rx="0.3" fill="#22D3EE"/>
      
      <rect x="31.5" y="14" width="8.5" height="7.5" rx="1.8" fill="white" stroke="#1E293B" stroke-width="0.6"/>
      <rect x="34" y="16" width="4" height="4" rx="0.8" fill="#1E293B"/>
      <rect x="34.8" y="16.8" width="1.8" height="1.8" rx="0.3" fill="#22D3EE"/>

      <!-- Blink -->
      <rect x="18" y="14" width="8.5" height="7.5" rx="1.8" fill="url(#faceG)">
        <animate attributeName="height" values="0;0;0;0;0;7.5;0;0;0;0;0;0;0;0" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="31.5" y="14" width="8.5" height="7.5" rx="1.8" fill="url(#faceG)">
        <animate attributeName="height" values="0;0;0;0;0;7.5;0;0;0;0;0;0;0;0" dur="3.5s" repeatCount="indefinite"/>
      </rect>

      <!-- Smile -->
      <path d="M23 28 Q29 34 35 28" fill="none" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>

    </g>
  </g>
</svg>
